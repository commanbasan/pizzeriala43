<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galería | Pizzeria La 43</title>
  <meta name="description" content="Galería visual de Pizzeria La 43: identidad, menú, estandarte y piezas de marca.">
  <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html" aria-label="Pizzeria La 43 inicio">
      <img src="assets/logo-nav.png" alt="La 43 Pizzeria">
    </a>
    <button class="nav-toggle" type="button" aria-label="Abrir menú" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <nav class="site-nav" aria-label="Navegación principal">
      <a href="index.html">Inicio</a>
      <a href="menu.html">Menú</a>
      <a href="eventos.html">Eventos</a>
      <a href="esencia.html">Esencia</a>
      <a href="galeria.html" aria-current="page">Galería</a>
      <a href="index.html#contacto">Contacto</a>
    </nav>
  </header>

  <main>
    <section class="event-hero">
      <div class="gallery-hero-media" aria-hidden="true"></div>
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <p class="eyebrow">Galería</p>
        <h1 line-height: 1.7>La 43 en detalles.</h1>
        <p class="hero-copy">Identidad visual, piezas de menú y referencias que construyen el carácter de la pizzería.</p>
        <div class="hero-actions">
          <a class="button primary" href="menu.html">Ver menú</a>
          <a class="button secondary" href="esencia.html">Ver esencia</a>
        </div>
      </div>
    </section>

    <section class="gallery-section">
      <div class="section-shell">
        <div class="gallery-page-grid">
          <figure class="gallery-tile lightbox-trigger" tabindex="0" role="button" aria-label="Ampliar imagen" data-full="assets/fondo-hero.jpg" data-caption="Pizza Margarita">
            <img src="assets/fondo-hero.jpg" alt="Pizza Margarita">
            <figcaption>Margarita</figcaption>
          </figure>
          <figure class="gallery-tile lightbox-trigger" tabindex="0" role="button" aria-label="Ampliar imagen" data-full="assets/gallery/bruschetta.jpeg" data-caption="Bruschetta">
            <img src="assets/gallery/bruschetta.jpeg" alt="Menú de entradas La 43">
            <figcaption>Bruschetta</figcaption>
          </figure>
          <figure class="gallery-tile featured lightbox-trigger" tabindex="0" role="button" aria-label="Ampliar Fachada" data-full="assets/gallery/fachada.jpeg" data-caption="Fachada">
            <img src="assets/gallery/fachada.jpeg" alt="Fachada La 43">
            <figcaption>Fachada</figcaption>
          </figure>
          <figure class="gallery-tile lightbox-trigger" tabindex="0" role="button" aria-label="Ampliar imagen" data-full="assets/gallery/carpaccio.jpeg" data-caption="Carpaccio">
            <img src="assets/gallery/carpaccio.jpeg" alt="Carpaccio de Higos">
            <figcaption>Carpaccio de Higos</figcaption>
          </figure>
          <figure class="gallery-tile lightbox-trigger" tabindex="0" role="button" aria-label="Ampliar imagen" data-full="assets/gallery/dip-de-ricotta.jpeg" data-caption="Dip de Ricotta">
            <img src="assets/gallery/dip-de-ricotta.jpeg" alt="Dip de Ricotta">
            <figcaption>Dip de Ricotta</figcaption>
          </figure>
          <figure class="gallery-tile lightbox-trigger" tabindex="0" role="button" aria-label="Ampliar imagen" data-full="assets/gallery/burrata.jpeg" data-caption="Burrata">
            <img src="assets/gallery/burrata.jpeg" alt="Burrata">
            <figcaption>Burrata</figcaption>
          </figure>
          <figure class="gallery-tile lightbox-trigger" tabindex="0" role="button" aria-label="Ampliar Instagram" data-full="assets/instagram-qr-cropped.jpeg" data-caption="Instagram">
            <img src="assets/instagram-qr-cropped.jpeg" alt="Instagram de La 43">
            <figcaption>Instagram</figcaption>
          </figure>
        </div>
      </div>
    </section>
  </main>

  <div class="lightbox" role="dialog" aria-modal="true" aria-label="Imagen ampliada" hidden>
    <button class="lightbox-close" type="button" aria-label="Cerrar imagen ampliada">×</button>
    <button class="lightbox-nav lightbox-prev" type="button" aria-label="Imagen anterior">‹</button>
    <figure class="lightbox-content">
      <img class="lightbox-image" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==" alt="">
      <figcaption class="lightbox-caption"></figcaption>
    </figure>
    <button class="lightbox-nav lightbox-next" type="button" aria-label="Imagen siguiente">›</button>
  </div>

  <footer class="site-footer">
    <p>Pizzeria La 43 · Galería</p>
    <a href="index.html#contacto">Contacto</a>
  </footer>

  <script src="script.js?v=2"></script>
</body>
</html>
